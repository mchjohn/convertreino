name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: convertreino
          POSTGRES_PASSWORD: convertreino
          POSTGRES_DB: convertreino_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convertreino -d convertreino_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://convertreino:convertreino@localhost:5432/convertreino_test
      STRAVA_CLIENT_ID: fake-client-id
      STRAVA_CLIENT_SECRET: fake-client-secret
      STRAVA_REDIRECT_URI: http://localhost:8000/auth/strava/callback
      JWT_SECRET: test-jwt-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: |
          uv run pytest --cov=convertreino.domain --cov=convertreino.mcp --cov=convertreino.application --cov-report=term-missing
          uv run coverage report --include='*/convertreino/domain/*' --fail-under=95
          uv run coverage report --include='*/convertreino/mcp/*' --fail-under=90
          uv run coverage report --include='*/convertreino/application/*' --fail-under=80

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+psycopg://convertreino:convertreino@localhost:5432/convertreino_test
        run: uv run alembic upgrade head
