name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  chat-accuracy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: convertreino
          POSTGRES_PASSWORD: convertreino
          POSTGRES_DB: convertreino_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convertreino -d convertreino_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      E2E_LLM: "1"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      JWT_SECRET: test-jwt-secret-for-nightly
      TEST_DATABASE_URL: postgresql+psycopg://convertreino:convertreino@localhost:5432/convertreino_test
      STRAVA_CLIENT_ID: fake-client-id
      STRAVA_CLIENT_SECRET: fake-client-secret
      STRAVA_REDIRECT_URI: http://localhost:8000/auth/strava/callback

    steps:
      - uses: actions/checkout@v4

      - name: Verify API key secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is required for nightly chat accuracy"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Chat intent accuracy E2E
        env:
          E2E_RESULTS_JSON: e2e-accuracy-results.json
        run: uv run pytest -m e2e --tb=short -v

      - name: Job summary
        if: always()
        run: uv run python -m tests.e2e.job_summary
