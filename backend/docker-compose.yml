services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convertreino
      POSTGRES_PASSWORD: convertreino
      POSTGRES_DB: convertreino
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convertreino -d convertreino"]
      interval: 2s
      timeout: 5s
      retries: 10

  phoenix:
    profiles: ["observability"]
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006"]
      interval: 5s
      timeout: 3s
      retries: 10
